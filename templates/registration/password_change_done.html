{% extends 'app/base.html' %}
{% block title %} Password Changed - {{ store.name }} {% endblock title %}

{% block body %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="mb-4">
                    <i class="fas fa-check-circle text-success fa-4x"></i>
                </div>
                <h3 class="fw-bold mb-3">Password Changed Successfully</h3>
                <p class="text-muted mb-4">Your password has been updated. You can now continue using the site.</p>
                <div class="d-grid">
                    <a href="{% url 'index' %}" class="btn btn-primary rounded-3 py-2">
                        Go to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
